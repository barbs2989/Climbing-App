<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ClimbMatch</title>
    <style>
      /* Mobile baseline */
      html { -webkit-text-size-adjust: 100%; }
      * { -webkit-tap-highlight-color: transparent; }
      body { overscroll-behavior-y: none; }
      /* Buttons: kill the 300ms tap delay + double-tap zoom, add press feedback */
      button { touch-action: manipulation; }
      button:not(:disabled):active { opacity: 0.82; transform: scale(0.97); }
      /* Smooth state changes: presses ease back, tab/selection colours & borders glide */
      button, a, input, select, textarea, [style*="cursor: pointer"] { transition: transform .09s ease, opacity .12s ease, background-color .16s ease, border-color .16s ease, color .15s ease, box-shadow .18s ease; }
      /* Tappable cards & chips (not just <button>) press in on tap */
      [style*="cursor: pointer"]:active { transform: scale(0.985); }
      /* Motion — subtle life. Respect reduced-motion. */
      @keyframes cm-pop { 0%{transform:scale(.6);opacity:0} 60%{transform:scale(1.12)} 100%{transform:scale(1);opacity:1} }
      @keyframes cm-confetti { 0%{transform:translateY(-10px) rotate(0);opacity:1} 100%{transform:translateY(110vh) rotate(680deg);opacity:0} }
      @keyframes cm-slideup { from{transform:translateY(14px);opacity:0} to{transform:translateY(0);opacity:1} }
      @keyframes cm-fadein { from{opacity:0} to{opacity:1} }
      @keyframes cm-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(63,185,80,.45)} 70%{box-shadow:0 0 0 7px rgba(63,185,80,0)} }
      @keyframes cm-shimmer { 0%{background-position:-280px 0} 100%{background-position:280px 0} }
      .cm-shimmer { background:linear-gradient(90deg,#161b22 25%,#222a35 50%,#161b22 75%); background-size:560px 100%; animation: cm-shimmer 1.25s linear infinite; }
      @keyframes cm-spin { to{transform:rotate(360deg)} }
      .cm-spin { animation: cm-spin .7s linear infinite; }
      @keyframes cm-nudge { 0%{transform:scale(1)} 35%{transform:scale(1.25)} 100%{transform:scale(1)} }
      @keyframes cm-burst { 0%{transform:translate(-50%,0) scale(.5);opacity:0} 20%{opacity:1} 100%{transform:translate(-50%,-34px) scale(1.5);opacity:0} }
      @keyframes cm-glow { 0%,100%{box-shadow:0 0 0 0 rgba(227,179,65,0)} 50%{box-shadow:0 0 9px 0 rgba(227,179,65,.18)} }
      @keyframes cm-ring { 0%,55%,100%{transform:rotate(0)} 62%{transform:rotate(16deg)} 70%{transform:rotate(-13deg)} 78%{transform:rotate(9deg)} 86%{transform:rotate(-5deg)} }
      @keyframes cm-puff { 0%{transform:translate(-50%,0) scale(.4);opacity:.65} 100%{transform:translate(-50%,-14px) scale(2.4);opacity:0} }
      @keyframes cm-countpop { 0%{transform:translateY(2px);opacity:.4} 100%{transform:translateY(0);opacity:1} }
      .cm-nudge { animation: cm-nudge .34s cubic-bezier(.2,.8,.2,1); }
      .cm-note::placeholder { font-size: 10.5px; opacity: 0.6; }
      /* Keyboard focus ring (only for keyboard nav, not mouse/touch) */
      :focus-visible { outline: 2px solid #2f81f7; outline-offset: 2px; border-radius: 5px; }
      button:focus:not(:focus-visible), a:focus:not(:focus-visible) { outline: none; }
      .cm-pop { animation: cm-pop .42s cubic-bezier(.2,.8,.2,1) both; }
      .cm-burst { animation: cm-burst .85s ease-out forwards; }
      .cm-confetti { animation: cm-confetti 1.7s linear forwards; }
      .cm-slideup { animation: cm-slideup .26s ease both; }
      .cm-fadein { animation: cm-fadein .22s ease both; }
      .cm-pulse { animation: cm-pulse 2s ease-in-out infinite; }
      .cm-glow { animation: cm-glow 2.4s ease-in-out infinite; }
      .cm-ring { animation: cm-ring 2.4s ease-in-out infinite; transform-origin: 50% 10%; display: inline-block; }
      .cm-puff { animation: cm-puff .6s ease-out forwards; }
      .cm-newitem { animation: cm-glow 1.6s ease-in-out 2; }
      /* Horizontal sliders: smooth touch scroll, no visible scrollbar */
      .cm-hscroll { -webkit-overflow-scrolling: touch; scrollbar-width: none; }
      .cm-hscroll::-webkit-scrollbar { display: none; }
      /* Staggered list entrance — children rise in one after another */
      .cm-stagger > * { animation: cm-slideup .3s ease both; }
      .cm-stagger > *:nth-child(2){animation-delay:.04s} .cm-stagger > *:nth-child(3){animation-delay:.08s}
      .cm-stagger > *:nth-child(4){animation-delay:.12s} .cm-stagger > *:nth-child(5){animation-delay:.16s}
      .cm-stagger > *:nth-child(6){animation-delay:.2s} .cm-stagger > *:nth-child(n+7){animation-delay:.24s}
      /* Bottom sheets (rounded-top containers) slide up when they open */
      [style*="18px 18px 0 0"], [style*="16px 16px 0 0"] { animation: cm-slideup .28s cubic-bezier(.2,.8,.2,1) both; }
      @media (prefers-reduced-motion: reduce) {
        *, button:not(:disabled):active { animation: none !important; transform: none !important; }
      }
      /* 16px inputs so iOS doesn't auto-zoom the page when a field is focused */
      input, textarea, select { font-size: 16px !important; }
      .cm-fsm { font-size: 13px !important; }
      /* Route/area cover photos hidden for now (pairs with SHOW_COVERS in ClimbMatch.jsx).
         Hide the image, and collapse boxes whose only child is the image so cards don't
         leave an empty gap. Banner/header overlays (back button, badges) are preserved. */
      .cover-x { display: none !important; }
      *:has(> .cover-x:only-child) { display: none !important; }
    </style>
  </head>
  <body style="margin:0;background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
